<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SSTI Lab - Frontend Console</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; background: #1e1e1e; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff5252; border-bottom: 1px solid #333; padding-bottom: 10px; }
        input[type="text"] { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; font-family: monospace; }
        button { background: #ff5252; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff7373; }
        .box { margin-top: 25px; padding: 15px; border-radius: 4px; min-height: 50px; font-family: monospace; white-space: pre-wrap; }
        .success-box { background: #1b5e20; border-left: 5px solid #4caf50; }
        .error-box { background: #b71c1c; border-left: 5px solid #f44336; color: #ffcdd2; }
    </style>
</head>
<body>

<div class="container">
    <h2>SSTI Detection Console (Chameleon Engine)</h2>
    <p>Enter your detection polyglots or payloads below:</p>
    
    <input type="text" id="payloadInput" placeholder="Enter payload here...">
    <button onclick="sendPayload()">Submit to API</button>

    <h3>Backend Response Output:</h3>
    <div id="outputDisplay" class="box success-box">Waiting for input...</div>
</div>

<script>
async function sendPayload() {
    const payload = document.getElementById('payloadInput').value;
    const outputDisplay = document.getElementById('outputDisplay');
    
    const targetUrl = `/api/render?payload=${encodeURIComponent(payload)}`;
    
    try {
        const response = await fetch(targetUrl);
        const data = await response.json();
        
        if (response.ok) {
            outputDisplay.className = "box success-box";
            outputDisplay.textContent = data.result;
        } else {
            outputDisplay.className = "box error-box";
            outputDisplay.textContent = `[SERVER ERROR 500]\n${data.error_message}`;
        }
    } catch (err) {
        outputDisplay.className = "box error-box";
        outputDisplay.textContent = `[FETCH ERROR] Could not connect to API backend.\n${err}`;
    }
}
</script>

</body>
</html>
